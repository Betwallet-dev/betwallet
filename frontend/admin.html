<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetWallet - Administration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c1a;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #11162b;
            border-radius: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 24px; font-weight: 700; }
        .logo span { color: #f5b042; }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #11162b;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-number { font-size: 32px; font-weight: 700; color: #f5b042; }
        .stat-label { color: #8b8cae; margin-top: 5px; }
        .table-container {
            background: #11162b;
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #f5b042; font-weight: 600; }
        .btn {
            background: rgba(245,176,66,0.2);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: #f5b042;
            cursor: pointer;
            margin: 2px;
            font-size: 12px;
        }
        .btn:hover { background: #f5b042; color: #0a0c1a; }
        .btn-danger { background: rgba(239,68,68,0.2); color: #ef4444; }
        .btn-danger:hover { background: #ef4444; color: white; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #11162b;
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close { font-size: 28px; cursor: pointer; }
        input, select {
            width: 100%;
            padding: 12px;
            background: #0a0c1a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            margin: 10px 0;
        }
        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        .search-box input { flex: 1; margin: 0; }
        .asset-badge {
            display: inline-block;
            background: rgba(245,176,66,0.15);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin: 2px;
        }
        .login-form {
            max-width: 400px;
            margin: 100px auto;
            background: #11162b;
            padding: 30px;
            border-radius: 20px;
        }
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            th, td { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="adminContent" style="display: none;">
        <div class="container">
            <div class="header">
                <div class="logo">🎲 Bet<span>Wallet</span> <span style="font-size: 14px;">ADMIN</span></div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn" onclick="loadUsers()"><i class="fas fa-sync-alt"></i> Actualiser</button>
                    <button class="btn btn-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
                </div>
            </div>
            
            <div class="stats">
                <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div class="stat-label">Utilisateurs</div></div>
                <div class="stat-card"><div class="stat-number" id="totalValue">$0</div><div class="stat-label">Valeur totale</div></div>
                <div class="stat-card"><div class="stat-number" id="totalTransactions">0</div><div class="stat-label">Transactions</div></div>
                <div class="stat-card"><div class="stat-number" id="newToday">0</div><div class="stat-label">Nouveaux aujourd'hui</div></div>
            </div>
            
            <div class="table-container">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Rechercher..." onkeyup="searchUsers()">
                </div>
                <table>
                    <thead>
                        <tr><th>ID</th><th>Nom</th><th>Email</th><th>Actifs</th><th>Valeur</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="usersTable"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="loginPanel" class="login-form">
        <h2 style="text-align:center; margin-bottom:20px;">🔐 Accès Admin</h2>
        <input type="email" id="adminEmail" placeholder="Email admin" value="admin@betwallet.com">
        <input type="password" id="adminPassword" placeholder="Mot de passe admin">
        <button class="btn" style="width:100%; padding:12px;" onclick="adminLogin()">Se connecter</button>
        <p style="text-align:center; margin-top:15px; color:#8b8cae; font-size:12px;">Accès réservé au propriétaire</p>
    </div>

    <!-- Modal Envoyer -->
    <div id="sendModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>📤 Envoyer</h3><span class="close" onclick="closeModal('sendModal')">&times;</span></div>
            <p>Utilisateur: <strong id="sendUsername"></strong></p>
            <select id="sendSymbol">
                <option value="BTC">Bitcoin (BTC)</option><option value="ETH">Ethereum (ETH)</option>
                <option value="BNB">BNB (BNB)</option><option value="SOL">Solana (SOL)</option>
                <option value="USDT">Tether (USDT)</option>
                <option value="XRP">Ripple (XRP)</option><option value="ADA">Cardano (ADA)</option>
                <option value="DOGE">Dogecoin (DOGE)</option><option value="MATIC">Polygon (MATIC)</option>
                <option value="DOT">Polkadot (DOT)</option><option value="AVAX">Avalanche (AVAX)</option>
                <option value="LINK">Chainlink (LINK)</option>
            </select>
            <input type="number" id="sendAmount" placeholder="Montant" step="0.000001">
            <button class="btn" style="width:100%;" onclick="sendCrypto()">Envoyer</button>
        </div>
    </div>

    <!-- Modal Modifier Solde -->
    <div id="balanceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>✏️ Modifier solde</h3><span class="close" onclick="closeModal('balanceModal')">&times;</span></div>
            <p>Utilisateur: <strong id="balanceUsername"></strong></p>
            <select id="balanceSymbol">
                <option value="BTC">Bitcoin (BTC)</option><option value="ETH">Ethereum (ETH)</option>
                <option value="BNB">BNB (BNB)</option><option value="SOL">Solana (SOL)</option>
                <option value="USDT">Tether (USDT)</option>
                <option value="XRP">Ripple (XRP)</option><option value="ADA">Cardano (ADA)</option>
                <option value="DOGE">Dogecoin (DOGE)</option><option value="MATIC">Polygon (MATIC)</option>
                <option value="DOT">Polkadot (DOT)</option><option value="AVAX">Avalanche (AVAX)</option>
                <option value="LINK">Chainlink (LINK)</option>
            </select>
            <input type="number" id="balanceAmount" placeholder="Nouveau solde" step="0.000001">
            <button class="btn" style="width:100%;" onclick="updateBalance()">Mettre à jour</button>
        </div>
    </div>

    <!-- Modal Modifier Adresse -->
    <div id="addressModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>🔑 Modifier adresse</h3><span class="close" onclick="closeModal('addressModal')">&times;</span></div>
            <p>Utilisateur: <strong id="addressUsername"></strong></p>
            <select id="addressSymbol">
                <option value="BTC">Bitcoin (BTC)</option><option value="ETH">Ethereum (ETH)</option>
                <option value="BNB">BNB (BNB)</option><option value="SOL">Solana (SOL)</option>
                <option value="USDT">Tether (USDT)</option>
                <option value="XRP">Ripple (XRP)</option><option value="ADA">Cardano (ADA)</option>
                <option value="DOGE">Dogecoin (DOGE)</option><option value="MATIC">Polygon (MATIC)</option>
                <option value="DOT">Polkadot (DOT)</option><option value="AVAX">Avalanche (AVAX)</option>
                <option value="LINK">Chainlink (LINK)</option>
            </select>
            <input type="text" id="newAddress" placeholder="Nouvelle adresse">
            <button class="btn" style="width:100%;" onclick="updateAddress()">Mettre à jour</button>
        </div>
    </div>

    <script>
        const API_URL = '';
        let adminToken = localStorage.getItem('adminToken');
        
        if (adminToken) checkAdminSession();
        
        async function checkAdminSession() {
            try {
                const res = await fetch(`/api/admin/verify`, { headers: { 'Authorization': `Bearer ${adminToken}` } });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('loginPanel').style.display = 'none';
                    document.getElementById('adminContent').style.display = 'block';
                    loadUsers();
                } else { localStorage.removeItem('adminToken'); }
            } catch(e) {}
        }
        
        async function adminLogin() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const res = await fetch(`/api/admin/login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('adminToken', data.token);
                adminToken = data.token;
                document.getElementById('loginPanel').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadUsers();
            } else alert('Identifiants incorrects');
        }
        
        let currentUsers = [];
        
        async function loadUsers() {
            const res = await fetch(`/api/admin/users`, { headers: { 'Authorization': `Bearer ${adminToken}` } });
            const data = await res.json();
            if (data.success) {
                currentUsers = data.users;
                document.getElementById('totalUsers').innerText = data.users.length;
                const totalValue = data.users.reduce((s, u) => s + (u.totalValue || 0), 0);
                document.getElementById('totalValue').innerHTML = `$${totalValue.toLocaleString()}`;
                const totalTx = data.users.reduce((s, u) => s + (u.transactions?.length || 0), 0);
                document.getElementById('totalTransactions').innerText = totalTx;
                renderUsersTable(data.users);
            }
        }
        
        function renderUsersTable(users) {
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.id}</td>
                    <td><strong>${user.username}</strong></td>
                    <td>${user.email}</td>
                    <td>${user.assets?.map(a => `<div class="asset-badge"><strong>${a.symbol}</strong>: ${a.balance.toFixed(6)} <span style="color:#10b981;">@ $${a.currentPrice?.toLocaleString()}</span></div>`).join('') || '-'}</td>
                    <td><strong>$${(user.totalValue || 0).toLocaleString()}</strong></td>
                    <td>
                        <button class="btn" onclick="openSendModal(${user.id}, '${user.username}')"><i class="fas fa-paper-plane"></i> Envoyer</button>
                        <button class="btn" onclick="openBalanceModal(${user.id}, '${user.username}')"><i class="fas fa-edit"></i> Solde</button>
                        <button class="btn" onclick="openAddressModal(${user.id}, '${user.username}')"><i class="fas fa-key"></i> Adresse</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function searchUsers() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = currentUsers.filter(u => u.username.toLowerCase().includes(term) || u.email.toLowerCase().includes(term));
            renderUsersTable(filtered);
        }
        
        let currentUserId = null;
        
        function openSendModal(id, name) {
            currentUserId = id;
            document.getElementById('sendUsername').innerText = name;
            document.getElementById('sendModal').style.display = 'flex';
        }
        
        function openBalanceModal(id, name) {
            currentUserId = id;
            document.getElementById('balanceUsername').innerText = name;
            document.getElementById('balanceModal').style.display = 'flex';
        }
        
        function openAddressModal(id, name) {
            currentUserId = id;
            document.getElementById('addressUsername').innerText = name;
            document.getElementById('addressModal').style.display = 'flex';
        }
        
        async function sendCrypto() {
            const symbol = document.getElementById('sendSymbol').value;
            const amount = parseFloat(document.getElementById('sendAmount').value);
            if (!amount || amount <= 0) { alert('Montant invalide'); return; }
            const res = await fetch(`/api/admin/send-crypto`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
                body: JSON.stringify({ userId: currentUserId, symbol, amount })
            });
            const data = await res.json();
            if (data.success) {
                alert(`✅ ${amount} ${symbol} envoyé !`);
                closeModal('sendModal');
                loadUsers();
            } else alert(data.error);
        }
        
        async function updateBalance() {
            const symbol = document.getElementById('balanceSymbol').value;
            const balance = parseFloat(document.getElementById('balanceAmount').value);
            if (isNaN(balance) || balance < 0) { alert('Solde invalide'); return; }
            const res = await fetch(`/api/admin/update-balance`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
                body: JSON.stringify({ userId: currentUserId, symbol, balance })
            });
            const data = await res.json();
            if (data.success) {
                alert(`✅ Solde ${symbol} mis à jour`);
                closeModal('balanceModal');
                loadUsers();
            } else alert(data.error);
        }
        
        async function updateAddress() {
            const symbol = document.getElementById('addressSymbol').value;
            const newAddress = document.getElementById('newAddress').value;
            if (!newAddress) { alert('Adresse invalide'); return; }
            const res = await fetch(`/api/admin/update-address`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
                body: JSON.stringify({ userId: currentUserId, symbol, newAddress })
            });
            const data = await res.json();
            if (data.success) {
                alert(`✅ Adresse ${symbol} mise à jour`);
                closeModal('addressModal');
                loadUsers();
            } else alert(data.error);
        }
        
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { localStorage.removeItem('adminToken'); location.reload(); }
        
        setInterval(() => { if (adminToken) loadUsers(); }, 30000);
    </script>
</body>
</html>
