<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetWallet - Administration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c1a;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #11162b;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .logo { font-size: 24px; font-weight: 700; }
        .logo span { color: #f5b042; }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #11162b;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-number { font-size: 32px; font-weight: 700; color: #f5b042; }
        .stat-label { color: #8b8cae; margin-top: 5px; }
        .table-container {
            background: #11162b;
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #f5b042; font-weight: 600; }
        .badge { background: rgba(245,176,66,0.2); padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .login-form {
            max-width: 400px;
            margin: 100px auto;
            background: #11162b;
            padding: 30px;
            border-radius: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            margin: 10px 0;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #f5b042, #e08e1a);
            border: none;
            border-radius: 40px;
            color: #0a0c1a;
            font-weight: 600;
            cursor: pointer;
        }
        .logout-btn {
            background: rgba(239,68,68,0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
        }
        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        .search-box input { flex: 1; margin: 0; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2648;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="adminContent" style="display: none;">
        <div class="container">
            <div class="header">
                <div class="logo">🎲 Bet<span>Wallet</span> <span style="font-size: 14px; background: #f5b04220; padding: 4px 12px; border-radius: 20px;">ADMIN</span></div>
                <button class="btn logout-btn" style="width: auto; padding: 10px 20px;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
            </div>
            
            <div class="stats">
                <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div class="stat-label">Utilisateurs</div></div>
                <div class="stat-card"><div class="stat-number" id="totalWallets">0</div><div class="stat-label">Portefeuilles</div></div>
                <div class="stat-card"><div class="stat-number" id="totalValue">$0</div><div class="stat-label">Valeur totale</div></div>
                <div class="stat-card"><div class="stat-number" id="newToday">0</div><div class="stat-label">Nouveaux aujourd'hui</div></div>
            </div>
            
            <div class="table-container">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Rechercher par nom, email ou adresse..." onkeyup="searchUsers()">
                </div>
                <table>
                    <thead>
                        <tr><th>ID</th><th>Nom d'utilisateur</th><th>Email</th><th>Adresse du portefeuille</th><th>Date d'inscription</th><th>Solde total</th></tr>
                    </thead>
                    <tbody id="usersTable"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="loginPanel" class="login-form">
        <h2 style="text-align:center; margin-bottom:20px;">🔐 Accès Admin</h2>
        <input type="email" id="adminEmail" placeholder="Email admin" value="admin@betwallet.com">
        <input type="password" id="adminPassword" placeholder="Mot de passe admin">
        <button class="btn" onclick="adminLogin()">Se connecter</button>
        <p style="text-align:center; margin-top:15px; color:#8b8cae; font-size:12px;">Accès réservé au propriétaire</p>
    </div>

    <script>
        const API_URL = 'https://supportblockchain.finance/api';
        let adminToken = localStorage.getItem('adminToken');
        
        if (adminToken) {
            checkAdminSession();
        }
        
        async function checkAdminSession() {
            try {
                const res = await fetch(`${API_URL}/admin/verify`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('loginPanel').style.display = 'none';
                    document.getElementById('adminContent').style.display = 'block';
                    loadAdminData();
                } else {
                    localStorage.removeItem('adminToken');
                    document.getElementById('loginPanel').style.display = 'block';
                    document.getElementById('adminContent').style.display = 'none';
                }
            } catch(e) { console.error(e); }
        }
        
        async function adminLogin() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            if (email !== 'admin@betwallet.com') {
                showToast('Email admin incorrect');
                return;
            }
            try {
                const res = await fetch(`${API_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    adminToken = data.token;
                    document.getElementById('loginPanel').style.display = 'none';
                    document.getElementById('adminContent').style.display = 'block';
                    loadAdminData();
                } else {
                    showToast('Mot de passe admin incorrect');
                }
            } catch(e) { showToast('Erreur réseau'); }
        }
        
        async function loadAdminData() {
            try {
                const res = await fetch(`${API_URL}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('totalUsers').innerText = data.users.length;
                    document.getElementById('totalWallets').innerText = data.users.length;
                    const totalValue = data.users.reduce((sum, u) => sum + (u.total_balance || 0), 0);
                    document.getElementById('totalValue').innerHTML = `$${totalValue.toLocaleString()}`;
                    const today = new Date().toISOString().split('T')[0];
                    const newToday = data.users.filter(u => u.created_at?.split('T')[0] === today).length;
                    document.getElementById('newToday').innerText = newToday;
                    renderUsersTable(data.users);
                }
            } catch(e) { console.error(e); }
        }
        
        function renderUsersTable(users) {
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.username}</td>
                    <td>${user.email}</td>
                    <td style="font-family:monospace; font-size:12px;">${user.wallet_address?.substring(0, 16)}...</td>
                    <td>${new Date(user.created_at).toLocaleDateString()}</td>
                    <td>$${(user.total_balance || 0).toLocaleString()}</td>
                </tr>
            `).join('');
        }
        
        function searchUsers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#usersTable tr');
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(searchTerm) ? '' : 'none';
            });
        }
        
        function logout() {
            localStorage.removeItem('adminToken');
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('adminContent').style.display = 'none';
            showToast('Déconnecté');
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
