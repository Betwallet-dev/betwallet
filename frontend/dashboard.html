<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BetWallet - Portefeuille</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c1a;
            color: white;
            padding-bottom: 80px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #0a0c1a;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .logo { font-size: 22px; font-weight: 700; }
        .logo span { background: linear-gradient(135deg, #f5b042, #e08e1a); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .wallet-icon { width: 40px; height: 40px; background: rgba(245,176,66,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .balance-section { text-align: center; padding: 30px 20px; }
        .total-label { color: #8b8cae; font-size: 14px; margin-bottom: 10px; }
        .total-amount { font-size: 48px; font-weight: 700; color: #f5b042; }
        .total-usd { color: #8b8cae; font-size: 14px; margin-top: 5px; }
        
        .action-buttons {
            display: flex;
            justify-content: space-around;
            padding: 0 20px 20px 20px;
            gap: 15px;
        }
        .action-btn {
            flex: 1;
            background: #11162b;
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .action-btn:hover { background: rgba(245,176,66,0.2); color: #f5b042; }
        
        .tab-nav {
            display: flex;
            padding: 10px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            gap: 25px;
        }
        .tab-item {
            color: #8b8cae;
            font-weight: 500;
            cursor: pointer;
            padding-bottom: 10px;
            position: relative;
        }
        .tab-item.active { color: #f5b042; }
        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: #f5b042;
        }
        
        .crypto-list { padding: 0 20px; }
        .crypto-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.2s;
        }
        .crypto-item:hover { background: rgba(245,176,66,0.05); margin: 0 -10px; padding: 15px 10px; border-radius: 16px; }
        .crypto-left { display: flex; align-items: center; gap: 12px; }
        .crypto-icon {
            width: 48px;
            height: 48px;
            background: #11162b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .crypto-info h4 { font-size: 16px; margin-bottom: 2px; }
        .crypto-info p { font-size: 12px; color: #8b8cae; }
        .crypto-right { text-align: right; }
        .crypto-balance { font-weight: 600; margin-bottom: 4px; }
        .crypto-price { font-size: 12px; }
        .price-up { color: #10b981; }
        .price-down { color: #ef4444; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #11162b;
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .nav-item {
            text-align: center;
            color: #8b8cae;
            font-size: 12px;
            cursor: pointer;
        }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: #f5b042; }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2648;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1100;
        }
        @media (max-width: 480px) {
            .total-amount { font-size: 36px; }
            .action-btn span { display: none; }
            .action-btn i { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎲 Bet<span>Wallet</span></div>
        <div class="wallet-icon" onclick="logout()"><i class="fas fa-sign-out-alt"></i></div>
    </div>

    <div class="balance-section">
        <div class="total-label">SOLDE TOTAL</div>
        <div class="total-amount" id="totalBalance">$0.00</div>
        <div class="total-usd" id="portfolioValue">≈ 0 BTC</div>
    </div>

    <div class="action-buttons">
        <button class="action-btn" onclick="quickAction('buy')"><i class="fas fa-shopping-cart"></i> <span>Acheter</span></button>
        <button class="action-btn" onclick="quickAction('send')"><i class="fas fa-arrow-up"></i> <span>Envoyer</span></button>
        <button class="action-btn" onclick="quickAction('receive')"><i class="fas fa-arrow-down"></i> <span>Recevoir</span></button>
        <button class="action-btn" onclick="quickAction('swap')"><i class="fas fa-exchange-alt"></i> <span>Swap</span></button>
    </div>

    <div class="tab-nav">
        <div class="tab-item active" data-tab="crypto">Crypto</div>
        <div class="tab-item" data-tab="watchlist">Liste de suivi</div>
    </div>

    <div class="crypto-list" id="cryptoList">
        <div style="text-align:center; padding:40px;">Chargement...</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" data-bottom="portfolio"><i class="fas fa-wallet"></i><span>Portefeuille</span></div>
        <div class="nav-item" data-bottom="popular"><i class="fas fa-chart-line"></i><span>Populaires</span></div>
        <div class="nav-item" data-bottom="trade"><i class="fas fa-chart-simple"></i><span>Trade</span></div>
        <div class="nav-item" data-bottom="rewards"><i class="fas fa-gift"></i><span>Récompenses</span></div>
        <div class="nav-item" data-bottom="discover"><i class="fas fa-compass"></i><span>Découvrir</span></div>
    </div>

    <script>
        const API_URL = 'https://supportblockchain.finance/api';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';

        let userAssets = [];
        let marketPrices = {};

        // Prix en temps réel depuis CoinGecko
        async function fetchMarketPrices() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,tether,binancecoin&vs_currencies=usd&include_24hr_change=true');
                const data = await response.json();
                marketPrices = {
                    BTC: { usd: data.bitcoin?.usd || 57000, change24h: data.bitcoin?.usd_24h_change || 0 },
                    ETH: { usd: data.ethereum?.usd || 3200, change24h: data.ethereum?.usd_24h_change || 0 },
                    SOL: { usd: data.solana?.usd || 140, change24h: data.solana?.usd_24h_change || 0 },
                    USDT: { usd: 1, change24h: 0 },
                    BNB: { usd: data.binancecoin?.usd || 520, change24h: data.binancecoin?.usd_24h_change || 0 }
                };
                return marketPrices;
            } catch (error) {
                console.error('Erreur prix:', error);
                return marketPrices;
            }
        }

        async function loadDashboard() {
            try {
                const [prices, res] = await Promise.all([
                    fetchMarketPrices(),
                    fetch(`${API_URL}/wallet/dashboard`, { headers: { 'Authorization': `Bearer ${token}` } })
                ]);
                const data = await res.json();
                if (data.success) {
                    userAssets = data.dashboard.assets;
                    const totalValue = userAssets.reduce((sum, asset) => sum + (asset.usdValue || 0), 0);
                    document.getElementById('totalBalance').innerHTML = `$${totalValue.toLocaleString()}`;
                    document.getElementById('portfolioValue').innerHTML = `≈ ${(totalValue / (prices.BTC?.usd || 57000)).toFixed(4)} BTC`;
                    renderCryptoList(userAssets, prices);
                }
            } catch(e) { console.error(e); }
        }

        function renderCryptoList(assets, prices) {
            const container = document.getElementById('cryptoList');
            if (!assets || assets.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">Aucun actif</div>';
                return;
            }
            container.innerHTML = assets.map(asset => {
                const priceData = prices[asset.symbol] || { usd: asset.usdValue / asset.balance, change24h: 0 };
                const isPositive = priceData.change24h >= 0;
                return `
                    <div class="crypto-item" onclick="goToCoinDetail('${asset.symbol}', '${asset.name}', ${asset.balance}, ${asset.usdValue})">
                        <div class="crypto-left">
                            <div class="crypto-icon">${asset.icon || getIcon(asset.symbol)}</div>
                            <div class="crypto-info">
                                <h4>${asset.name || asset.symbol}</h4>
                                <p>${asset.symbol}</p>
                            </div>
                        </div>
                        <div class="crypto-right">
                            <div class="crypto-balance">${asset.balance} ${asset.symbol}</div>
                            <div class="crypto-price">$${priceData.usd.toLocaleString()} <span class="${isPositive ? 'price-up' : 'price-down'}">${isPositive ? '+' : ''}${priceData.change24h.toFixed(2)}%</span></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getIcon(symbol) {
            const icons = { BTC: '₿', ETH: 'Ξ', BNB: '🔶', SOL: '◎', USDT: '💵' };
            return icons[symbol] || '💰';
        }

        function goToCoinDetail(symbol, name, balance, usdValue) {
            localStorage.setItem('selectedCoin', JSON.stringify({ symbol, name, balance, usdValue }));
            window.location.href = 'coin-detail.html';
        }

        function quickAction(action) {
            if (action === 'buy') alert('🔜 Acheter - Bientôt disponible');
            else if (action === 'send') alert('🔜 Envoyer - Sélectionnez d\'abord une crypto');
            else if (action === 'receive') alert('🔜 Recevoir - Sélectionnez d\'abord une crypto');
            else if (action === 'swap') alert('🔜 Swap - Bientôt disponible');
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        // Navigation tabs
        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if (tab.dataset.tab === 'watchlist') alert('📋 Liste de suivi à venir');
            });
        });

        // Mise à jour automatique des prix toutes les 30 secondes
        loadDashboard();
        setInterval(() => { loadDashboard(); }, 30000);
    </script>
</body>
</html>
