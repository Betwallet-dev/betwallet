<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetWallet - Portefeuille</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c1a;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
        }

        .logo span {
            background: linear-gradient(135deg, #f5b042, #e08e1a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .wallet-address {
            background: rgba(245, 176, 66, 0.1);
            padding: 8px 16px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 12px;
            cursor: pointer;
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, #11162b, #0a0e1c);
            border-radius: 28px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .balance-label {
            color: #8b8cae;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .balance-amount {
            font-size: 48px;
            font-weight: 700;
            color: #f5b042;
        }

        .balance-usd {
            color: #8b8cae;
            margin-top: 5px;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f5b042, #e08e1a);
            color: #0a0c1a;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-secondary:hover, .btn-primary:hover {
            transform: translateY(-2px);
        }

        /* Assets Grid */
        .assets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .asset-card {
            background: rgba(17, 22, 43, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }

        .asset-card:hover {
            border-color: rgba(245, 176, 66, 0.3);
        }

        .asset-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .asset-icon {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .asset-info h4 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .asset-info p {
            font-size: 12px;
            color: #8b8cae;
        }

        .asset-balance {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .asset-price {
            font-size: 14px;
            color: #8b8cae;
        }

        .price-up { color: #10b981; }
        .price-down { color: #ef4444; }

        /* Chart */
        .chart-section {
            background: rgba(17, 22, 43, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        /* Seed phrase modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #11162b;
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .seed-box {
            background: #0a0c1a;
            padding: 20px;
            border-radius: 12px;
            font-family: monospace;
            margin: 20px 0;
            word-break: break-all;
        }

        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .assets-grid { grid-template-columns: 1fr; }
            .balance-amount { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎲 Bet<span>Wallet</span></div>
            <div class="wallet-address" id="walletAddress" onclick="copyAddress()">Chargement...</div>
        </div>

        <div class="balance-card">
            <div class="balance-label">SOLDE TOTAL</div>
            <div class="balance-amount" id="totalBalance">$0</div>
            <div class="balance-usd" id="portfolioValue">≈ 0 BTC</div>
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="openSendModal()">
                    <i class="fas fa-arrow-up"></i> Envoyer
                </button>
                <button class="btn btn-secondary" onclick="openReceiveModal()">
                    <i class="fas fa-arrow-down"></i> Recevoir
                </button>
                <button class="btn btn-secondary" onclick="showSeedPhrase()">
                    <i class="fas fa-key"></i> Seed phrase
                </button>
                <button class="btn btn-secondary" onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>

        <div class="chart-section">
            <canvas id="portfolioChart" height="200"></canvas>
        </div>

        <div class="assets-grid" id="assetsGrid">
            <div style="text-align: center; grid-column: 1/-1;">Chargement des actifs...</div>
        </div>
    </div>

    <!-- Modal Envoyer -->
    <div id="sendModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('sendModal')">&times;</span>
            <h3><i class="fas fa-paper-plane"></i> Envoyer</h3>
            <div class="form-group" style="margin: 20px 0;">
                <select id="sendSymbol" style="width:100%; padding:12px; border-radius:10px;">
                    <option value="ETH">Ethereum (ETH)</option>
                    <option value="BTC">Bitcoin (BTC)</option>
                    <option value="SOL">Solana (SOL)</option>
                    <option value="USDT">Tether (USDT)</option>
                </select>
            </div>
            <div class="form-group">
                <input type="text" id="sendTo" placeholder="Adresse du destinataire" style="width:100%; padding:12px; border-radius:10px;">
            </div>
            <div class="form-group">
                <input type="number" id="sendAmount" placeholder="Montant" style="width:100%; padding:12px; border-radius:10px;">
            </div>
            <button class="btn btn-primary" style="width:100%;" onclick="sendTransaction()">Confirmer</button>
        </div>
    </div>

    <!-- Modal Recevoir -->
    <div id="receiveModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('receiveModal')">&times;</span>
            <h3><i class="fas fa-qrcode"></i> Recevoir</h3>
            <div class="form-group" style="margin: 20px 0;">
                <select id="receiveSymbol" style="width:100%; padding:12px; border-radius:10px;" onchange="updateReceiveAddress()">
                    <option value="ETH">Ethereum (ETH)</option>
                    <option value="BTC">Bitcoin (BTC)</option>
                    <option value="SOL">Solana (SOL)</option>
                </select>
            </div>
            <div class="seed-box" id="receiveAddress">Chargement...</div>
            <button class="btn btn-secondary" onclick="copyReceiveAddress()">Copier l'adresse</button>
        </div>
    </div>

    <!-- Modal Seed Phrase -->
    <div id="seedModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('seedModal')">&times;</span>
            <h3><i class="fas fa-shield-alt"></i> Votre seed phrase</h3>
            <div class="warning" style="background: rgba(239,68,68,0.1); color:#ef4444; padding:12px; border-radius:8px; margin:15px 0; font-size:12px;">
                ⚠️ Ne partagez JAMAIS cette phrase. Quiconque l'a peut contrôler vos cryptos.
            </div>
            <div class="seed-box" id="seedPhraseDisplay">Chargement...</div>
            <button class="btn btn-secondary" onclick="copySeedPhrase()">Copier</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://supportblockchain.finance/api';
        let chart = null;
        let currentPrices = {};

        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';

        // Charger les données
        async function loadDashboard() {
            try {
                const response = await fetch(`${API_URL}/wallet/balances`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('walletAddress').innerHTML = 
                        `<i class="fas fa-copy"></i> ${data.wallet.ethereum.substring(0, 8)}...${data.wallet.ethereum.substring(-4)}`;
                    
                    renderAssets(data.balances);
                    updateTotalBalance(data.balances);
                    initChart(data.balances);
                }
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        function renderAssets(balances) {
            const assets = [
                { symbol: 'ETH', name: 'Ethereum', icon: '💎', balance: balances.ethereum || 0, price: 3200 },
                { symbol: 'BTC', name: 'Bitcoin', icon: '₿', balance: balances.bitcoin || 0, price: 57000 },
                { symbol: 'SOL', name: 'Solana', icon: '◎', balance: balances.solana || 0, price: 140 },
                { symbol: 'USDT', name: 'Tether', icon: '💵', balance: balances.usdt || 0, price: 1 }
            ];

            const grid = document.getElementById('assetsGrid');
            grid.innerHTML = assets.map(asset => `
                <div class="asset-card">
                    <div class="asset-header">
                        <div class="asset-icon">${asset.icon}</div>
                        <div class="asset-info">
                            <h4>${asset.name}</h4>
                            <p>${asset.symbol}</p>
                        </div>
                    </div>
                    <div class="asset-balance">${asset.balance.toFixed(6)} ${asset.symbol}</div>
                    <div class="asset-price">$${(asset.balance * asset.price).toLocaleString()} USD</div>
                    <div class="price-up" id="change-${asset.symbol}">--</div>
                </div>
            `).join('');
        }

        function updateTotalBalance(balances) {
            const total = (balances.ethereum * 3200) + (balances.bitcoin * 57000) + (balances.solana * 140) + (balances.usdt || 0);
            document.getElementById('totalBalance').innerHTML = `$${total.toLocaleString()}`;
            document.getElementById('portfolioValue').innerHTML = `≈ ${(total / 57000).toFixed(4)} BTC`;
        }

        function initChart(balances) {
            const ctx = document.getElementById('portfolioChart').getContext('2d');
            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['1j', '2j', '3j', '4j', '5j', '6j', 'Aujourd\'hui'],
                    datasets: [{
                        label: 'Valeur du portefeuille',
                        data: [0, 0, 0, 0, 0, 0, 0],
                        borderColor: '#f5b042',
                        backgroundColor: 'rgba(245, 176, 66, 0.05)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { labels: { color: '#8b8cae' } } }
                }
            });
        }

        async function showSeedPhrase() {
            const response = await fetch(`${API_URL}/wallet/seed`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            if (data.success) {
                document.getElementById('seedPhraseDisplay').innerText = data.seedPhrase;
                document.getElementById('seedModal').style.display = 'flex';
            }
        }

        async function updateReceiveAddress() {
            const symbol = document.getElementById('receiveSymbol').value;
            const response = await fetch(`${API_URL}/wallet/address/${symbol}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            if (data.success) {
                document.getElementById('receiveAddress').innerText = data.address;
            }
        }

        function openSendModal() { document.getElementById('sendModal').style.display = 'flex'; }
        function openReceiveModal() { 
            updateReceiveAddress();
            document.getElementById('receiveModal').style.display = 'flex'; 
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function copyAddress() { copyToClipboard('walletAddress'); }
        function copyReceiveAddress() { copyToClipboard('receiveAddress'); }
        function copySeedPhrase() { copyToClipboard('seedPhraseDisplay'); }
        
        function copyToClipboard(elementId) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text);
            alert('Copié !');
        }

        async function sendTransaction() {
            const to = document.getElementById('sendTo').value;
            const amount = document.getElementById('sendAmount').value;
            const symbol = document.getElementById('sendSymbol').value;
            
            if (!to || !amount) {
                alert('Remplissez tous les champs');
                return;
            }
            
            const response = await fetch(`${API_URL}/wallet/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ to, amount, symbol })
            });
            const data = await response.json();
            if (data.success) {
                alert('Transaction envoyée !');
                closeModal('sendModal');
                loadDashboard();
            } else {
                alert(data.error);
            }
        }

        function refreshData() { loadDashboard(); }

        // WebSocket pour prix temps réel
        function initWebSocket() {
            const ws = new WebSocket(`wss://${window.location.host}`);
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.prices) {
                    for (const [symbol, price] of Object.entries(data.prices)) {
                        const changeEl = document.getElementById(`change-${symbol}`);
                        if (changeEl) {
                            changeEl.innerText = `+${price.change24h}%`;
                        }
                    }
                }
            };
        }

        loadDashboard();
        initWebSocket();
    </script>
</body>
</html>
