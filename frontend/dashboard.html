<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BetWallet - Portefeuille</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c1a;
            color: white;
            padding-bottom: 80px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #0a0c1a;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .logo { font-size: 22px; font-weight: 700; }
        .logo span { background: linear-gradient(135deg, #f5b042, #e08e1a); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .wallet-icon { width: 40px; height: 40px; background: rgba(245,176,66,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .balance-section { text-align: center; padding: 30px 20px; }
        .total-label { color: #8b8cae; font-size: 14px; margin-bottom: 10px; }
        .total-amount { font-size: 48px; font-weight: 700; color: #f5b042; }
        .total-usd { color: #8b8cae; font-size: 14px; margin-top: 5px; }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            padding: 0 20px 20px 20px;
            gap: 15px;
        }
        .action-btn {
            flex: 1;
            max-width: 150px;
            background: #11162b;
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .action-btn:hover { background: rgba(245,176,66,0.2); color: #f5b042; }
        
        /* Onglet Crypto */
        .tab-nav {
            display: flex;
            padding: 10px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            gap: 25px;
        }
        .tab-item {
            color: #8b8cae;
            font-weight: 500;
            cursor: pointer;
            padding-bottom: 10px;
            position: relative;
        }
        .tab-item.active { color: #f5b042; }
        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: #f5b042;
        }
        
        .crypto-list { padding: 0 20px; display: block; }
        .crypto-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.2s;
        }
        .crypto-item:hover { background: rgba(245,176,66,0.05); margin: 0 -10px; padding: 15px 10px; border-radius: 16px; }
        .crypto-left { display: flex; align-items: center; gap: 12px; }
        .crypto-icon {
            width: 48px;
            height: 48px;
            background: #11162b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .crypto-info h4 { font-size: 16px; margin-bottom: 2px; }
        .crypto-info p { font-size: 12px; color: #8b8cae; }
        .crypto-right { text-align: right; }
        .crypto-balance { font-weight: 600; margin-bottom: 4px; }
        .crypto-price { font-size: 12px; }
        .price-up { color: #10b981; }
        .price-down { color: #ef4444; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #11162b;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            color: #8b8cae;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 8px 16px;
            border-radius: 40px;
        }
        .nav-item i { font-size: 22px; }
        .nav-item span { font-size: 12px; font-weight: 500; }
        .nav-item.active { color: #f5b042; background: rgba(245,176,66,0.1); }
        .nav-item:hover { color: #f5b042; background: rgba(245,176,66,0.05); }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #11162b;
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close { font-size: 28px; cursor: pointer; }
        input, select {
            width: 100%;
            padding: 12px;
            background: #0a0c1a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            margin: 10px 0;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f5b042, #e08e1a);
            border: none;
            border-radius: 40px;
            color: #0a0c1a;
            font-weight: 600;
            cursor: pointer;
        }
        
        @media (max-width: 480px) {
            .total-amount { font-size: 36px; }
            .action-btn span { display: none; }
            .nav-item { padding: 8px 12px; }
            .nav-item span { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎲 Bet<span>Wallet</span></div>
        <div class="wallet-icon" onclick="logout()"><i class="fas fa-sign-out-alt"></i></div>
    </div>

    <div class="balance-section">
        <div class="total-label">SOLDE TOTAL</div>
        <div class="total-amount" id="totalBalance">$0.00</div>
        <div class="total-usd" id="portfolioValue">≈ 0 BTC</div>
    </div>

    <div class="action-buttons">
        <button class="action-btn" onclick="openSendModal()"><i class="fas fa-arrow-up"></i> <span>Envoyer</span></button>
        <button class="action-btn" onclick="openReceiveModal()"><i class="fas fa-arrow-down"></i> <span>Recevoir</span></button>
    </div>

    <!-- Onglet Crypto -->
    <div class="tab-nav">
        <div class="tab-item active" data-tab="crypto">Crypto</div>
    </div>

    <div class="crypto-list" id="cryptoList">
        <div style="text-align:center; padding:40px;">Chargement des cryptos...</div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" data-nav="home"><i class="fas fa-home"></i><span>Accueil</span></button>
        <button class="nav-item" data-nav="deposit"><i class="fas fa-arrow-down"></i><span>Dépôt</span></button>
        <button class="nav-item" data-nav="history"><i class="fas fa-history"></i><span>Historique</span></button>
        <button class="nav-item" data-nav="profile"><i class="fas fa-user"></i><span>Profile</span></button>
    </div>

    <!-- Modal Envoyer -->
    <div id="sendModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>⬆️ Envoyer</h3><span class="close" onclick="closeModal('sendModal')">&times;</span></div>
            <select id="sendSymbol">
                <option value="BTC">Bitcoin (BTC)</option>
                <option value="ETH">Ethereum (ETH)</option>
                <option value="BNB">BNB (BNB)</option>
                <option value="SOL">Solana (SOL)</option>
                <option value="USDT">Tether (USDT)</option>
                <option value="XRP">Ripple (XRP)</option>
                <option value="ADA">Cardano (ADA)</option>
                <option value="DOGE">Dogecoin (DOGE)</option>
                <option value="MATIC">Polygon (MATIC)</option>
                <option value="DOT">Polkadot (DOT)</option>
                <option value="AVAX">Avalanche (AVAX)</option>
                <option value="LINK">Chainlink (LINK)</option>
            </select>
            <input type="text" id="sendTo" placeholder="Adresse du destinataire">
            <input type="number" id="sendAmount" placeholder="Montant" step="0.000001">
            <button class="btn" onclick="sendTransaction()">Confirmer</button>
        </div>
    </div>

    <!-- Modal Recevoir -->
    <div id="receiveModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>⬇️ Recevoir</h3><span class="close" onclick="closeModal('receiveModal')">&times;</span></div>
            <select id="receiveSymbol" onchange="updateReceiveAddress()">
                <option value="BTC">Bitcoin (BTC)</option>
                <option value="ETH">Ethereum (ETH)</option>
                <option value="BNB">BNB (BNB)</option>
                <option value="SOL">Solana (SOL)</option>
                <option value="USDT">Tether (USDT)</option>
                <option value="XRP">Ripple (XRP)</option>
                <option value="ADA">Cardano (ADA)</option>
                <option value="DOGE">Dogecoin (DOGE)</option>
                <option value="MATIC">Polygon (MATIC)</option>
                <option value="DOT">Polkadot (DOT)</option>
                <option value="AVAX">Avalanche (AVAX)</option>
                <option value="LINK">Chainlink (LINK)</option>
            </select>
            <div style="background:#0a0c1a; padding:12px; border-radius:12px; margin-top:15px; word-break:break-all; font-family:monospace; font-size:12px;" id="receiveAddress"></div>
            <button class="btn" style="margin-top:15px;" onclick="copyAddress()">📋 Copier</button>
        </div>
    </div>

    <script>
        const API_URL = '';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';

        let userAssets = [];
        let marketPrices = {};

        const allCryptos = [
            { symbol: 'BTC', name: 'Bitcoin', icon: '₿', network: 'Bitcoin' },
            { symbol: 'ETH', name: 'Ethereum', icon: 'Ξ', network: 'Ethereum' },
            { symbol: 'BNB', name: 'BNB Smart Chain', icon: '🔶', network: 'BSC' },
            { symbol: 'SOL', name: 'Solana', icon: '◎', network: 'Solana' },
            { symbol: 'USDT', name: 'Tether', icon: '💵', network: 'ERC-20' },
            { symbol: 'XRP', name: 'Ripple', icon: '💎', network: 'XRP Ledger' },
            { symbol: 'ADA', name: 'Cardano', icon: '🔷', network: 'Cardano' },
            { symbol: 'DOGE', name: 'Dogecoin', icon: '🐕', network: 'Dogecoin' },
            { symbol: 'MATIC', name: 'Polygon', icon: '🔺', network: 'Polygon' },
            { symbol: 'DOT', name: 'Polkadot', icon: '⛓️', network: 'Polkadot' },
            { symbol: 'AVAX', name: 'Avalanche', icon: '❄️', network: 'Avalanche' },
            { symbol: 'LINK', name: 'Chainlink', icon: '🔗', network: 'Ethereum' }
        ];

        async function fetchMarketPrices() {
            try {
                const response = await fetch(`/api/prices`);
                const data = await response.json();
                if (data.success && data.prices) {
                    marketPrices = {
                        BTC: { usd: data.prices.bitcoin?.usd || 57000, change24h: data.prices.bitcoin?.usd_24h_change || 0 },
                        ETH: { usd: data.prices.ethereum?.usd || 3200, change24h: data.prices.ethereum?.usd_24h_change || 0 },
                        BNB: { usd: data.prices.binancecoin?.usd || 520, change24h: data.prices.binancecoin?.usd_24h_change || 0 },
                        SOL: { usd: data.prices.solana?.usd || 140, change24h: data.prices.solana?.usd_24h_change || 0 },
                        USDT: { usd: 1, change24h: 0 },
                        XRP: { usd: data.prices.ripple?.usd || 0.5, change24h: data.prices.ripple?.usd_24h_change || 0 },
                        ADA: { usd: data.prices.cardano?.usd || 0.3, change24h: data.prices.cardano?.usd_24h_change || 0 },
                        DOGE: { usd: data.prices.dogecoin?.usd || 0.08, change24h: data.prices.dogecoin?.usd_24h_change || 0 },
                        MATIC: { usd: data.prices.polygon?.usd || 0.5, change24h: data.prices.polygon?.usd_24h_change || 0 },
                        DOT: { usd: data.prices.polkadot?.usd || 6, change24h: data.prices.polkadot?.usd_24h_change || 0 },
                        AVAX: { usd: data.prices.avalanche_2?.usd || 35, change24h: data.prices.avalanche_2?.usd_24h_change || 0 },
                        LINK: { usd: data.prices.chainlink?.usd || 14, change24h: data.prices.chainlink?.usd_24h_change || 0 }
                    };
                }
                return marketPrices;
            } catch (error) {
                console.error('Erreur prix:', error);
                return marketPrices;
            }
        }

        async function loadDashboard() {
            try {
                const [prices, res] = await Promise.all([
                    fetchMarketPrices(),
                    fetch(`/api/wallet/dashboard`, { headers: { 'Authorization': `Bearer ${token}` } })
                ]);
                const data = await res.json();
                if (data.success) {
                    userAssets = data.dashboard.assets;
                    const userAssetMap = new Map();
                    userAssets.forEach(a => userAssetMap.set(a.symbol, a));
                    
                    const totalValue = userAssets.reduce((sum, a) => sum + (a.usdValue || 0), 0);
                    document.getElementById('totalBalance').innerHTML = `$${totalValue.toLocaleString()}`;
                    document.getElementById('portfolioValue').innerHTML = `≈ ${(totalValue / (prices.BTC?.usd || 57000)).toFixed(4)} BTC`;
                    
                    renderCryptoList(prices, userAssetMap);
                }
            } catch(e) { console.error(e); }
        }

        function renderCryptoList(prices, userAssetMap) {
            const container = document.getElementById('cryptoList');
            if (!container) return;
            
            container.innerHTML = allCryptos.map(crypto => {
                const userAsset = userAssetMap.get(crypto.symbol);
                const balance = userAsset?.balance || 0;
                const usdValue = userAsset?.usdValue || 0;
                const priceData = prices[crypto.symbol] || { usd: 0, change24h: 0 };
                const isPositive = priceData.change24h >= 0;
                
                return `
                    <div class="crypto-item" onclick="goToCoinDetail('${crypto.symbol}', '${crypto.name}', ${balance}, ${usdValue})">
                        <div class="crypto-left">
                            <div class="crypto-icon">${crypto.icon}</div>
                            <div class="crypto-info">
                                <h4>${crypto.name}</h4>
                                <p>${crypto.network} • ${crypto.symbol}</p>
                            </div>
                        </div>
                        <div class="crypto-right">
                            <div class="crypto-balance">${balance.toFixed(6)} ${crypto.symbol}</div>
                            <div class="crypto-price">$${priceData.usd.toLocaleString()} <span class="${isPositive ? 'price-up' : 'price-down'}">${isPositive ? '+' : ''}${priceData.change24h.toFixed(2)}%</span></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function goToCoinDetail(symbol, name, balance, usdValue) {
            localStorage.setItem('selectedCoin', JSON.stringify({ symbol, name, balance, usdValue }));
            window.location.href = 'coin-detail.html';
        }

        async function updateReceiveAddress() {
            const symbol = document.getElementById('receiveSymbol').value;
            const response = await fetch(`/api/wallet/address/${symbol}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            if (data.success) {
                document.getElementById('receiveAddress').innerHTML = data.address;
            }
        }

        function openSendModal() { document.getElementById('sendModal').style.display = 'flex'; }
        function openReceiveModal() { 
            updateReceiveAddress();
            document.getElementById('receiveModal').style.display = 'flex'; 
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function copyAddress() {
            const address = document.getElementById('receiveAddress').innerHTML;
            navigator.clipboard.writeText(address);
            alert('Adresse copiée !');
        }

        async function sendTransaction() {
            const to = document.getElementById('sendTo').value;
            const amount = parseFloat(document.getElementById('sendAmount').value);
            const symbol = document.getElementById('sendSymbol').value;
            if (!to || !amount) { alert('Remplissez tous les champs'); return; }
            try {
                const res = await fetch(`/api/wallet/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ to, amount, symbol })
                });
                const data = await res.json();
                if (data.success) {
                    alert('Transaction envoyée !');
                    closeModal('sendModal');
                    loadDashboard();
                } else alert(data.error);
            } catch(e) { alert('Erreur réseau'); }
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        // Tab navigation (un seul onglet, mais gardé pour compatibilité)
        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            });
        });

        // Bottom navigation
        document.querySelectorAll('.nav-item').forEach(nav => {
            nav.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                nav.classList.add('active');
                const page = nav.dataset.nav;
                if (page === 'home') {
                    document.querySelector('.crypto-list').style.display = 'block';
                } else if (page === 'deposit') {
                    alert('💰 Page Dépôt - Bientôt disponible');
                } else if (page === 'history') {
                    alert('📜 Page Historique - Bientôt disponible');
                } else if (page === 'profile') {
                    alert('👤 Page Profile - Bientôt disponible');
                }
            });
        });

        loadDashboard();
        setInterval(() => { loadDashboard(); }, 60000);
    </script>
</body>
</html>
