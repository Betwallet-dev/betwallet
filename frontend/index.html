<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetWallet - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0c1a 0%, #0f1328 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .card {
            background: rgba(17, 22, 43, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .logo { text-align: center; font-size: 42px; font-weight: 700; margin-bottom: 30px; }
        .logo span { background: linear-gradient(135deg, #f5b042, #e08e1a); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .tab-btn { flex: 1; background: transparent; border: none; padding: 12px; color: #8b8cae; font-weight: 600; cursor: pointer; border-radius: 12px; transition: all 0.3s; }
        .tab-btn.active { background: rgba(245, 176, 66, 0.15); color: #f5b042; }
        .form-group { margin-bottom: 20px; }
        input { width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 14px; }
        input:focus { outline: none; border-color: #f5b042; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #f5b042, #e08e1a); border: none; border-radius: 40px; color: #0a0c1a; font-weight: 600; cursor: pointer; font-size: 16px; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(245,176,66,0.3); }
        .btn-link { background: transparent; color: #8b8cae; margin-top: 15px; box-shadow: none; }
        .btn-link:hover { background: transparent; color: #f5b042; transform: none; box-shadow: none; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .forgot-password { text-align: right; margin-top: -10px; margin-bottom: 20px; }
        .forgot-password a { color: #8b8cae; font-size: 12px; text-decoration: none; cursor: pointer; }
        .forgot-password a:hover { color: #f5b042; }
        .success-message { color: #10b981; text-align: center; margin-top: 15px; font-size: 14px; }
        .error-message { color: #ef4444; text-align: center; margin-top: 15px; font-size: 14px; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2648;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1000;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🎲 Bet<span>Wallet</span></div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Connexion</button>
            <button class="tab-btn" onclick="switchTab('register')">Inscription</button>
            <button class="tab-btn" onclick="switchTab('forgot')">Mot de passe oublié ?</button>
        </div>
        
        <!-- Formulaire Connexion -->
        <form id="loginForm" class="auth-form active">
            <div class="form-group"><input type="email" id="loginEmail" placeholder="Email" required></div>
            <div class="form-group"><input type="password" id="loginPassword" placeholder="Mot de passe" required></div>
            <button type="submit" class="btn">Se connecter</button>
        </form>
        
        <!-- Formulaire Inscription -->
        <form id="registerForm" class="auth-form">
            <div class="form-group"><input type="text" id="regUsername" placeholder="Nom d'utilisateur" required></div>
            <div class="form-group"><input type="email" id="regEmail" placeholder="Email" required></div>
            <div class="form-group"><input type="password" id="regPassword" placeholder="Mot de passe (min. 6)" required></div>
            <div class="form-group"><input type="password" id="regConfirmPassword" placeholder="Confirmer" required></div>
            <button type="submit" class="btn">Créer un compte</button>
        </form>
        
        <!-- Formulaire Mot de passe oublié -->
        <form id="forgotForm" class="auth-form">
            <div class="form-group"><input type="email" id="forgotEmail" placeholder="Votre email" required></div>
            <button type="submit" class="btn">Envoyer le lien</button>
            <div id="forgotMessage" class="success-message"></div>
        </form>
        
        <!-- Formulaire Reset Password (caché, apparaît après clic sur lien) -->
        <div id="resetForm" class="auth-form" style="display: none;">
            <div class="form-group"><input type="password" id="resetNewPassword" placeholder="Nouveau mot de passe (min. 6)" required></div>
            <div class="form-group"><input type="password" id="resetConfirmPassword" placeholder="Confirmer" required></div>
            <button type="submit" class="btn" id="resetPasswordBtn">Réinitialiser</button>
            <div id="resetMessage" class="success-message"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://supportblockchain.finance/api';
        let resetToken = null;
        
        // Vérifier si l'URL contient un token de reset
        const urlParams = new URLSearchParams(window.location.search);
        const tokenParam = urlParams.get('token');
        if (tokenParam) {
            resetToken = tokenParam;
            // Vérifier le token
            fetch(`${API_URL}/auth/verify-reset-token`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: resetToken })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.querySelector('.tabs').style.display = 'none';
                    document.getElementById('resetForm').style.display = 'block';
                    showToast('🔐 Veuillez définir un nouveau mot de passe');
                } else {
                    showToast('❌ Lien invalide ou expiré');
                }
            });
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(form => form.style.display = 'none');
            
            if (tab === 'login') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('loginForm').style.display = 'block';
            } else if (tab === 'register') {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('registerForm').style.display = 'block';
            } else if (tab === 'forgot') {
                document.querySelector('.tab-btn:nth-child(3)').classList.add('active');
                document.getElementById('forgotForm').style.display = 'block';
            }
            
            document.getElementById('forgotMessage').innerHTML = '';
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // === CONNEXION ===
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    showToast(data.error || 'Erreur de connexion');
                }
            } catch(e) {
                showToast('Erreur réseau');
            }
        });
        
        // === INSCRIPTION ===
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            
            if (password !== confirm) {
                showToast('Les mots de passe ne correspondent pas');
                return;
            }
            if (password.length < 6) {
                showToast('Le mot de passe doit contenir au moins 6 caractères');
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    showToast(data.error);
                }
            } catch(e) {
                showToast('Erreur réseau');
            }
        });
        
        // === MOT DE PASSE OUBLIÉ ===
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            const submitBtn = e.target.querySelector('button');
            const originalText = submitBtn.innerHTML;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi...';
            
            try {
                const res = await fetch(`${API_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                
                if (data.success) {
                    // En démo, on affiche le token (en production, il serait envoyé par email)
                    if (data.resetToken) {
                        const resetUrl = `${window.location.origin}${window.location.pathname}?token=${data.resetToken}`;
                        document.getElementById('forgotMessage').innerHTML = `
                            <i class="fas fa-check-circle"></i> Lien de réinitialisation (démo):<br>
                            <a href="${resetUrl}" style="color:#f5b042; word-break:break-all;">${resetUrl}</a>
                        `;
                    } else {
                        document.getElementById('forgotMessage').innerHTML = data.message;
                    }
                } else {
                    document.getElementById('forgotMessage').innerHTML = `<span style="color:#ef4444;">${data.error}</span>`;
                }
            } catch(e) {
                document.getElementById('forgotMessage').innerHTML = '<span style="color:#ef4444;">Erreur réseau</span>';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });
        
        // === RÉINITIALISATION DU MOT DE PASSE ===
        document.getElementById('resetPasswordBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('resetNewPassword').value;
            const confirmPassword = document.getElementById('resetConfirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                document.getElementById('resetMessage').innerHTML = '<span style="color:#ef4444;">Les mots de passe ne correspondent pas</span>';
                return;
            }
            if (newPassword.length < 6) {
                document.getElementById('resetMessage').innerHTML = '<span style="color:#ef4444;">Mot de passe trop court (min. 6 caractères)</span>';
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, newPassword })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('resetMessage').innerHTML = '<span style="color:#10b981;">✅ Mot de passe réinitialisé ! Redirection vers la connexion...</span>';
                    setTimeout(() => {
                        window.location.href = window.location.pathname;
                    }, 2000);
                } else {
                    document.getElementById('resetMessage').innerHTML = `<span style="color:#ef4444;">${data.error}</span>`;
                }
            } catch(e) {
                document.getElementById('resetMessage').innerHTML = '<span style="color:#ef4444;">Erreur réseau</span>';
            }
        });
    </script>
</body>
</html>
