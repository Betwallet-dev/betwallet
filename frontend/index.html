<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetWallet - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .card {
            background: #11162b;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .logo { text-align: center; font-size: 36px; font-weight: 700; margin-bottom: 30px; }
        .logo span { background: linear-gradient(135deg, #f5b042, #e08e1a); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .tab-btn { flex: 1; background: transparent; border: none; padding: 12px; color: #8b8cae; font-weight: 600; cursor: pointer; border-radius: 12px; }
        .tab-btn.active { background: rgba(245, 176, 66, 0.15); color: #f5b042; }
        .form-group { margin-bottom: 20px; }
        input { width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 14px; }
        input:focus { outline: none; border-color: #f5b042; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #f5b042, #e08e1a); border: none; border-radius: 40px; color: #0a0c1a; font-weight: 600; cursor: pointer; font-size: 16px; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f2648; padding: 12px 24px; border-radius: 40px; z-index: 1000; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🎲 Bet<span>Wallet</span></div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Connexion</button>
            <button class="tab-btn" onclick="switchTab('register')">Inscription</button>
        </div>
        <form id="loginForm" class="auth-form active">
            <div class="form-group"><input type="email" id="loginEmail" placeholder="Email" required></div>
            <div class="form-group"><input type="password" id="loginPassword" placeholder="Mot de passe" required></div>
            <button type="submit" class="btn">Se connecter</button>
        </form>
        <form id="registerForm" class="auth-form">
            <div class="form-group"><input type="text" id="regUsername" placeholder="Nom d'utilisateur" required></div>
            <div class="form-group"><input type="email" id="regEmail" placeholder="Email" required></div>
            <div class="form-group"><input type="password" id="regPassword" placeholder="Mot de passe (min. 6)" required></div>
            <div class="form-group"><input type="password" id="regConfirmPassword" placeholder="Confirmer" required></div>
            <button type="submit" class="btn">Créer un compte</button>
        </form>
    </div>
    <script>
        const API_URL = 'https://supportblockchain.finance/api';
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPassword').value })
                });
                const data = await res.json();
                if (data.success) { localStorage.setItem('token', data.token); localStorage.setItem('user', JSON.stringify(data.user)); window.location.href = 'dashboard.html'; }
                else alert(data.error);
            } catch(e) { alert('Erreur réseau'); }
        });
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pwd = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            if (pwd !== confirm) { alert('Mots de passe différents'); return; }
            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: document.getElementById('regUsername').value, email: document.getElementById('regEmail').value, password: pwd })
                });
                const data = await res.json();
                if (data.success) { localStorage.setItem('token', data.token); localStorage.setItem('user', JSON.stringify(data.user)); window.location.href = 'dashboard.html'; }
                else alert(data.error);
            } catch(e) { alert('Erreur réseau'); }
        });
    </script>
</body>
</html>
