<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetWallet - Connexion</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">🎲 Bet<span>Wallet</span></div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Connexion</button>
                <button class="tab-btn" onclick="switchTab('register')">Inscription</button>
            </div>

            <form id="loginForm" class="auth-form active">
                <div class="input-group">
                    <input type="email" id="loginEmail" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Mot de passe" required>
                </div>
                <button type="submit" class="btn-primary">Se connecter</button>
            </form>

            <form id="registerForm" class="auth-form">
                <div class="input-group">
                    <input type="text" id="regUsername" placeholder="Nom d'utilisateur" required>
                </div>
                <div class="input-group">
                    <input type="email" id="regEmail" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="regPassword" placeholder="Mot de passe (min. 6 caractères)" required>
                </div>
                <div class="input-group">
                    <input type="password" id="regConfirmPassword" placeholder="Confirmer le mot de passe" required>
                </div>
                <button type="submit" class="btn-primary">Créer un compte</button>
            </form>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
